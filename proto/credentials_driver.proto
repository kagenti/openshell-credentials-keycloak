syntax = "proto3";

package openshell.credentials.v1;

option go_package = "github.com/kagenti/openshell-credentials-keycloak/gen/credentialsv1";

// Internal credentials-driver contract used by the gateway.
//
// The gateway delegates credential resolution to this driver over a Unix
// domain socket. The driver resolves named credential placeholders to
// real access tokens (e.g. via OAuth2 client_credentials grants).
service CredentialsDriver {
  // Resolve a named credential to an access token.
  rpc ResolveCredential(ResolveCredentialRequest) returns (ResolveCredentialResponse);

  // List all available credential names.
  rpc ListCredentials(ListCredentialsRequest) returns (ListCredentialsResponse);
}

message ResolveCredentialRequest {
  // Credential name as configured (e.g. "github-api", "kagenti-backend").
  string name = 1;
}

message ResolveCredentialResponse {
  // The resolved access token.
  string token = 1;
  // Token expiration as milliseconds since Unix epoch.
  int64 expires_at_ms = 2;
  // Token type (e.g. "bearer").
  string token_type = 3;
}

message ListCredentialsRequest {}

message ListCredentialsResponse {
  repeated CredentialInfo credentials = 1;
}

message CredentialInfo {
  // Credential name as configured.
  string name = 1;
  // Scopes associated with this credential.
  repeated string scopes = 2;
}
