version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen
    opt:
      - paths=source_relative
      - Mcredentials_driver.proto=github.com/kagenti/openshell-credentials-keycloak/gen/credentialsv1
  - remote: buf.build/grpc/go
    out: gen
    opt:
      - paths=source_relative
      - Mcredentials_driver.proto=github.com/kagenti/openshell-credentials-keycloak/gen/credentialsv1
